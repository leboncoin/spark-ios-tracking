name: 📋 Get all Spark Deprecated Components

on:
  schedule:
    - cron: '0 23 * * *' # Daily at 11 P.M
  workflow_dispatch:
    
env:
  GH_TOKEN: ${{ github.token }}

jobs:
  clone-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Clone matching repositories
        run: |
          # List all repos and filter by pattern
          repos=$(gh repo list leboncoin --limit 1000 --json name --jq '.[].name' | grep -E "spark-ios-component-.*")

          # Clone each matching repo
          for repo in $repos; do
            echo "Cloning $repo..."
            gh repo clone leboncoin/$repo
          done

      - name: List cloned repositories
        run: ls -la

      - name: Run component listing script
        run: |
          chmod +x script/list_deprecated_components.sh
          ./script/list_deprecated_components.sh

      - name: Upload component list artifact
        uses: actions/upload-artifact@v6
        with:
          name: deprecated-components-listing
          path: deprecated-components-listing.json
          retention-days: 90